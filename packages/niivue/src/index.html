<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>NiiVue Mouse Config Repro</title>
    <link rel="stylesheet" href="niivue.css" />
    <link rel="icon" href="data:;base64,iVBORw0KGgo=" />
  </head>
  <body>
    <main id="canvas-container">
      <div style="display: flex; width: 100vw; height: 100vh">
        <canvas id="gl1"></canvas>
      </div>
    </main>
  </body>
</html>
<script type="module" async>
  import { Niivue, DRAG_MODE, SHOW_RENDER, SLICE_TYPE } from './niivue/index.ts'

  const nv = new Niivue({
    show3Dcrosshair: true,
    logLevel: 'debug',
  })

  await nv.attachToCanvas(gl1)

  nv.setSliceType(SLICE_TYPE.MULTIPLANAR)
  nv.opts.multiplanarShowRender = SHOW_RENDER.ALWAYS

  nv.setMouseEventConfig({
    leftButton: {
      primary: DRAG_MODE.crosshair,
      withShift: DRAG_MODE.crosshair,
    },
    rightButton: DRAG_MODE.crosshair,
    centerButton: DRAG_MODE.pan,
  })

  await nv.loadVolumes([
    { url: '../demos/images/mni152.nii.gz' },
  ])

  nv.setClipPlane([0.15, 45, 15])

  window.nv = nv
  console.log('Repro ready: middle button is pan in multiplanar + 3D render tile')
</script>
