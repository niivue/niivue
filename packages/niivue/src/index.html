<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>NiiVue</title>
    <link rel="stylesheet" href="niivue.css" />
    <link rel="icon" href="data:;base64,iVBORw0KGgo=" />
  </head>
    <header>
      <label for="dpiCheck">HighDPI</label>
      <input type="checkbox" id="dpiCheck" checked />
      <label for="fontSelect">Choose a font:</label>
      <select id="fontSelect" onchange="changeFont()">
        <option value="roboto" selected>Roboto</option>
        <option value="garamond">Garamond</option>
        <option value="ubuntu">Ubuntu</option>
        <option value="ubuntubold">UbuntuBold</option>
      </select>
      <label for="ptsSlider">Min</label>
      <input type="range" min="3" max="50" value="3" class="slider" id="ptsSlider" />
      <label for="gainSlider">Gain</label>
      <input type="range" min="0" max="120" value="0" class="slider" id="gainSlider" />
      <button id="aboutBtn">About</button>
    </header>
    <main id="canvas-container">
      <div style="display: flex; width: 100%; height: 100%">
        <canvas id="gl1"></canvas>
      </div>
    </main>
    <footer>
      <label id="statusBar">&nbsp; </label>
    </footer>
</html>
<script type="module" async>
  import { Niivue, NVImage, NVMesh, NVMeshLoaders, SHOW_RENDER, DRAG_MODE, SLICE_TYPE } from './niivue/index.ts'
  var volumeList1 = [{ url: '../demos/images/pcasl.nii.gz', limitFrames4D: 5 }]
  const onLocationChange = (data) => {
    statusBar.innerHTML = data.string
  }
  dpiCheck.onclick = function () {
    nv1.setHighResolutionCapable(this.checked)
  }
  ptsSlider.oninput = function () {
    nv1.opts.textMinPoints = this.value
    nv1.drawScene()
  }
  gainSlider.oninput = function () {
    nv1.opts.textTaperedGain = this.value * 0.01
    nv1.drawScene()
  }
  
  let defaults = {
    loglevel: 'debug',
    onLocationChange: onLocationChange,
    isColorbar: true
  }
  fontSelect.onchange = function () {
    const fontName = this.value
    let font = 'Roboto-Regular'
    switch (fontName) {
      case "garamond":
        font = 'Garamond'
        break
      case "ubuntu":
        font = 'Ubuntu'
        break
      case "ubuntubold":
        font = 'UbuntuBold'
        break
    }
    nv1.loadFont(`./fonts/${font}.png`, `./fonts/${font}.json`)
  }
  var nv1 = new Niivue(defaults)
  await nv1.attachToCanvas(gl1)
  nv1.graph.autoSizeMultiplanar = true
  nv1.opts.multiplanarShowRender = SHOW_RENDER.ALWAYS
  nv1.graph.opacity = 1.0
  await nv1.loadVolumes(volumeList1)
  fontSelect.onchange()
  gainSlider.oninput()
  ptsSlider.oninput()
</script>
